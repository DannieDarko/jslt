[build-system]
requires = ["setuptools>=68", "wheel", "jmespath", "simpleeval"]
build-backend = "setuptools.build_meta"

[project]
name = "JSLT"
dynamic = ["version"]
description = "JSON transformation/templating engine"
authors = [
  { name="Daniel Rexin", email="daniel@medinion.de" },
]
readme = "README.md"
requires-python = ">=3.12.3"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "License :: OSI Approved :: MIT License",
]
license = { file = "LICENSE"}
dependencies = [
  "jmespath>=1.1.0",
  "simpleeval>=1.0.7",
]

[project.urls]
Homepage = "https://github.com/danniedarko/jslt"
Issues = "https://github.com/danniedarko/jslt/issues"

[tool.setuptools.packages.find]
where = ["src"]
include = ["jslt"]

[tool.setuptools.dynamic]
version = { attr = "jslt.__version__" }